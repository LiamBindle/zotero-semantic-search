<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'">
  <title>Zotero Semantic Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 12px;
      -webkit-user-select: none;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ── Status section ─────────────────────────────────────────────────── */
    .status-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-bottom: 14px;
      flex-shrink: 0;
    }

    .logo     { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 3px; }
    .subtitle { font-size: 10px; color: #444; margin-bottom: 20px; letter-spacing: 0.04em; }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #2a2a4a;
      border-top-color: #6c8fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-icon    { font-size: 24px; margin-bottom: 8px; line-height: 1; }
    .status-message { font-size: 13px; font-weight: 600; color: #ccc; }
    .status-detail  { font-size: 11px; color: #555; margin-top: 4px; min-height: 14px; }

    .btn {
      -webkit-app-region: no-drag;
      margin-top: 14px;
      padding: 8px 22px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-primary  { background: #6c8fff; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #8aabff; }
    .btn-danger   { background: #3a1a1a; color: #ff7070; border: 1px solid #5a2a2a; }
    .btn-danger:hover:not(:disabled)  { background: #4a2020; }

    .docker-link {
      -webkit-app-region: no-drag;
      display: block;
      margin-top: 8px;
      font-size: 11px;
      color: #6c8fff;
      cursor: pointer;
    }
    .docker-link:hover { text-decoration: underline; }

    /* ── Log section ─────────────────────────────────────────────────────── */
    .log-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .log-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 8px;
      background: #0f0f1f;
      border-radius: 5px 5px 0 0;
      border-bottom: 1px solid #1e1e3a;
      flex-shrink: 0;
    }

    .log-label {
      font-size: 9px;
      font-weight: 700;
      color: #3a3a5a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .copy-btn {
      -webkit-app-region: no-drag;
      font-size: 10px;
      background: none;
      border: 1px solid #2a2a4a;
      color: #4a4a6a;
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: #8a8aaa; border-color: #4a4a6a; }

    .log {
      flex: 1;
      overflow-y: auto;
      background: #0f0f1f;
      border-radius: 0 0 5px 5px;
      padding: 8px 10px;
      font-family: "SF Mono", "Consolas", "Menlo", monospace;
      font-size: 10px;
      line-height: 1.55;
      color: #5a8a6a;
      white-space: pre-wrap;
      word-break: break-all;
      -webkit-user-select: text;
      user-select: text;
      -webkit-app-region: no-drag;
    }
    .log::-webkit-scrollbar       { width: 4px; }
    .log::-webkit-scrollbar-track  { background: #0f0f1f; }
    .log::-webkit-scrollbar-thumb  { background: #2a2a4a; border-radius: 2px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Status -->
  <div class="status-section">
    <div class="logo">Zotero Semantic Search</div>
    <div class="subtitle">Local AI-powered search for your library</div>

    <div id="spinner" class="spinner"></div>
    <div id="status-icon" class="status-icon hidden"></div>
    <div id="status-message" class="status-message">Starting...</div>
    <div id="status-detail" class="status-detail"></div>

    <button id="open-btn"    class="btn btn-primary hidden">Open Zotero Search</button>
    <button id="retry-btn"   class="btn btn-danger  hidden">Retry</button>
    <span   id="docker-link" class="docker-link     hidden">Download Docker Desktop →</span>
  </div>

  <!-- Log -->
  <div class="log-section">
    <div class="log-toolbar">
      <span class="log-label">Logs</span>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
    <div class="log" id="log"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
