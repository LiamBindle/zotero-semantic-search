<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'">
  <title>Zotero Semantic Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      flex-direction: column;
      padding: 24px 24px 16px;
      -webkit-user-select: none;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ── Status section ─────────────────────────────────────────────────── */
    .status-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-bottom: 16px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 22px;
      letter-spacing: 0.01em;
    }

    .spinner {
      width: 22px; height: 22px;
      border: 2.5px solid #e5e7eb;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-icon    { font-size: 22px; margin-bottom: 10px; line-height: 1; }
    .status-message { font-size: 13px; font-weight: 600; color: #374151; }
    .status-detail  { font-size: 11px; color: #9ca3af; margin-top: 4px; min-height: 14px; }

    .btn {
      -webkit-app-region: no-drag;
      margin-top: 14px;
      padding: 7px 20px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-danger {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    .btn-danger:hover:not(:disabled) { background: #fee2e2; }

    .docker-link {
      -webkit-app-region: no-drag;
      display: block;
      margin-top: 10px;
      font-size: 11px;
      color: #4f46e5;
      cursor: pointer;
    }
    .docker-link:hover { text-decoration: underline; }

    /* ── Log section ─────────────────────────────────────────────────────── */
    .log-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .log-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 10px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    .log-label {
      font-size: 9px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .copy-btn {
      -webkit-app-region: no-drag;
      font-size: 10px;
      background: none;
      border: 1px solid #d1d5db;
      color: #6b7280;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: #374151; border-color: #9ca3af; }

    .log {
      flex: 1;
      overflow-y: auto;
      background: #ffffff;
      padding: 10px 12px;
      font-family: "SF Mono", "Consolas", "Menlo", monospace;
      font-size: 10px;
      line-height: 1.6;
      color: #4b5563;
      white-space: pre-wrap;
      word-break: break-all;
      -webkit-user-select: text;
      user-select: text;
      -webkit-app-region: no-drag;
    }
    .log::-webkit-scrollbar       { width: 4px; }
    .log::-webkit-scrollbar-track  { background: #ffffff; }
    .log::-webkit-scrollbar-thumb  { background: #d1d5db; border-radius: 2px; }
    .log .cmd  { color: #4f46e5; font-weight: 600; }
    .log .warn { color: #92400e; }
    .log .err  { color: #dc2626; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Status -->
  <div class="status-section">
    <div class="logo">Zotero Semantic Search</div>
    <div class="subtitle">Local AI-powered search for your library</div>

    <div id="spinner" class="spinner"></div>
    <div id="status-icon" class="status-icon hidden"></div>
    <div id="status-message" class="status-message">Starting...</div>
    <div id="status-detail" class="status-detail"></div>

    <button id="retry-btn"   class="btn btn-danger hidden">Retry</button>
    <span   id="docker-link" class="docker-link    hidden">Download Docker Desktop →</span>
  </div>

  <!-- Log -->
  <div class="log-section">
    <div class="log-toolbar">
      <span class="log-label">Logs</span>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
    <div class="log" id="log"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
