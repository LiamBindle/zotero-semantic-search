<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'">
  <title>Zotero Private Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      flex-direction: column;
      padding: 24px 24px 16px;
      -webkit-user-select: none;
      user-select: none;
      -webkit-app-region: drag;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .hidden { display: none !important; }

    /* ── Splash panel ─────────────────────────────────────────────────────── */
    #splash-panel {
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 28px;
      letter-spacing: 0.01em;
    }

    .spinner {
      width: 22px; height: 22px;
      border: 2.5px solid #e5e7eb;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-icon    { font-size: 22px; margin-bottom: 12px; line-height: 1; }
    .status-message { font-size: 13px; font-weight: 600; color: #374151; }
    .status-detail  { font-size: 11px; color: #9ca3af; margin-top: 4px; min-height: 14px; }

    .btn {
      -webkit-app-region: no-drag;
      margin-top: 14px;
      padding: 6px 18px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-danger {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    .btn-danger:hover { background: #fee2e2; }

    .docker-link {
      -webkit-app-region: no-drag;
      display: block;
      margin-top: 10px;
      font-size: 11px;
      color: #4f46e5;
      cursor: pointer;
    }
    .docker-link:hover { text-decoration: underline; }

    /* ── Shared panel card (logs + monitor) ───────────────────────────────── */
    .panel-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      flex-shrink: 0;
    }

    .panel-label {
      font-size: 9px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Logs panel ───────────────────────────────────────────────────────── */
    .copy-btn {
      -webkit-app-region: no-drag;
      font-size: 10px;
      background: none;
      border: 1px solid #d1d5db;
      color: #6b7280;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: #374151; border-color: #9ca3af; }

    .error-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #fef2f2;
      border-left: 1px solid #e5e7eb;
      border-right: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    .error-bar-msg {
      font-size: 11px;
      font-weight: 600;
      color: #dc2626;
    }

    .error-bar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .err-btn {
      -webkit-app-region: no-drag;
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      transition: background 0.15s;
    }
    .err-btn:hover { background: #fee2e2; }

    .err-link {
      -webkit-app-region: no-drag;
      font-size: 10px;
      color: #4f46e5;
      cursor: pointer;
    }
    .err-link:hover { text-decoration: underline; }

    .log {
      flex: 1;
      overflow-y: auto;
      background: #ffffff;
      padding: 10px 12px;
      font-family: "SF Mono", "Consolas", "Menlo", monospace;
      font-size: 10px;
      line-height: 1.6;
      color: #4b5563;
      white-space: pre-wrap;
      word-break: break-all;
      -webkit-user-select: text;
      user-select: text;
      -webkit-app-region: no-drag;
      border: 1px solid #e5e7eb;
      border-top: none;
      border-radius: 0 0 8px 8px;
    }
    .log::-webkit-scrollbar       { width: 4px; }
    .log::-webkit-scrollbar-track  { background: #ffffff; }
    .log::-webkit-scrollbar-thumb  { background: #d1d5db; border-radius: 2px; }
    .log .cmd  { color: #4f46e5; font-weight: 600; }
    .log .warn { color: #92400e; }
    .log .err  { color: #dc2626; }

    /* ── Monitor panel ────────────────────────────────────────────────────── */
    .monitor-body {
      flex: 1;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 16px;
      -webkit-app-region: no-drag;
    }

    .monitor-section { margin-bottom: 20px; }
    .monitor-section:last-child { margin-bottom: 0; }

    .monitor-section-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-bottom: 8px;
    }

    .stats-grid { display: flex; gap: 8px; }

    .stat-card {
      flex: 1;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px 10px;
    }

    .stat-card-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #9ca3af;
      margin-bottom: 3px;
    }

    .stat-card-val {
      font-family: "SF Mono", "Consolas", "Menlo", monospace;
      font-size: 11px;
      color: #374151;
      font-variant-numeric: tabular-nums;
    }

    .cpu-bars { display: flex; flex-direction: column; gap: 5px; }

    .cpu-bar-row { display: flex; align-items: center; gap: 6px; }

    .cpu-bar-label {
      font-size: 9px;
      color: #9ca3af;
      font-variant-numeric: tabular-nums;
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }

    .cpu-bar-track {
      flex: 1;
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }

    .cpu-bar-fill {
      height: 100%;
      background: #4f46e5;
      border-radius: 3px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .cpu-bar-pct {
      font-size: 9px;
      font-family: "SF Mono", "Consolas", "Menlo", monospace;
      color: #6b7280;
      font-variant-numeric: tabular-nums;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Splash: startup and errors -->
  <div id="splash-panel" class="panel">
    <div class="logo">Zotero Private Search</div>
    <div class="subtitle">Verifiably private semantic search for your Zotero library</div>
    <div id="spinner"     class="spinner"></div>
    <div id="status-icon" class="status-icon hidden"></div>
    <div id="status-message" class="status-message">Starting...</div>
    <div id="status-detail"  class="status-detail"></div>
    <button id="splash-retry"  class="btn btn-danger hidden">Retry</button>
    <span   id="splash-docker" class="docker-link   hidden">Download Docker Desktop →</span>
  </div>

  <!-- Logs (opened as separate window with ?panel=logs) -->
  <div id="logs-panel" class="panel hidden">
    <div class="panel-toolbar">
      <span class="panel-label">Logs</span>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
    <div id="error-bar" class="error-bar hidden">
      <span class="error-bar-msg" id="error-msg"></span>
      <div class="error-bar-actions">
        <button id="logs-retry"  class="err-btn  hidden">Retry</button>
        <span   id="logs-docker" class="err-link hidden">Download Docker Desktop →</span>
      </div>
    </div>
    <div class="log" id="log"></div>
  </div>

  <!-- Monitor (opened as separate window with ?panel=monitor) -->
  <div id="monitor-panel" class="panel hidden">
    <div class="panel-toolbar">
      <span class="panel-label">Monitor</span>
    </div>
    <div class="monitor-body">
      <div class="monitor-section">
        <div class="monitor-section-label">Container</div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card-label">CPU</div>
            <div class="stat-card-val" id="m-cpu">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">Memory</div>
            <div class="stat-card-val" id="m-mem">—</div>
          </div>
        </div>
      </div>
      <div class="monitor-section">
        <div class="monitor-section-label">Host CPUs</div>
        <div id="cpu-bars" class="cpu-bars"></div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
