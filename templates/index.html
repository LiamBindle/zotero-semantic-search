<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zotero Semantic Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #c0392b;
      --red-dk: #a93226;
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #e2e6ea;
      --text: #1a1a2e;
      --muted: #6c757d;
      --accent-blue: #e8f0fe;
      --accent-blue-text: #1a73e8;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--red);
      color: white;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; flex: 1; }
    .model-tag {
      font-size: 0.72rem;
      background: rgba(255,255,255,0.18);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    .reindex-btn {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
      padding: 0.3rem 0.8rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .reindex-btn:hover { background: rgba(255,255,255,0.25); }

    /* ── Layout ── */
    main { max-width: 880px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

    /* ── Progress ── */
    #progress-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    #progress-section.visible { display: block; }
    .progress-label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      display: flex;
      justify-content: space-between;
    }
    .progress-track {
      height: 10px;
      background: #e9ecef;
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--red);
      width: 0%;
      border-radius: 5px;
      transition: width 0.4s ease;
    }
    .progress-fill.indeterminate {
      width: 35%;
      animation: indeterminate 1.4s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(320%); }
    }

    /* ── Search ── */
    .search-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
    }
    .search-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .search-row input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      font-size: 1rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      outline: none;
      background: var(--bg);
    }
    .search-row input:focus { border-color: var(--red); background: white; }
    .search-row button {
      background: var(--red);
      color: white;
      border: none;
      padding: 0.6rem 1.3rem;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .search-row button:hover { background: var(--red-dk); }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .filter-row label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }
    .filter-row select {
      flex: 1;
      max-width: 320px;
      padding: 0.3rem 0.55rem;
      font-size: 0.88rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      outline: none;
      background: var(--bg);
    }
    .filter-row select:focus { border-color: var(--red); background: white; }
    #result-count { font-size: 0.8rem; color: var(--muted); margin-left: auto; }

    /* ── Result cards ── */
    #results { margin-top: 0.25rem; }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem 0.9rem;
      margin-bottom: 0.8rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      position: relative;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .card-citation { flex: 1; min-width: 0; }
    .citation-byline {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.18rem;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .score-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.22rem 0.5rem;
      border-radius: 4px;
    }
    .score-high  { background: #d4edda; color: #155724; }
    .score-mid   { background: #fff3cd; color: #856404; }
    .score-low   { background: #e9ecef; color: #6c757d; }
    .dismiss-btn {
      background: none;
      border: none;
      color: #bbb;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.1rem 0.25rem;
      border-radius: 3px;
    }
    .dismiss-btn:hover { color: #666; background: #f0f0f0; }

    /* fragment */
    .fragment-row { margin-top: 0.65rem; }
    .loc-badge {
      display: inline-block;
      font-size: 0.72rem;
      background: var(--accent-blue);
      color: var(--accent-blue-text);
      padding: 0.16rem 0.45rem;
      border-radius: 3px;
      margin-bottom: 0.35rem;
      font-weight: 500;
    }
    .fragment {
      background: #fffde7;
      border-left: 3px solid #f9a825;
      border-radius: 0 5px 5px 0;
      padding: 0.6rem 0.8rem;
      font-size: 0.84rem;
      line-height: 1.65;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
      user-select: text;
    }

    /* card footer */
    .card-footer {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
      flex-wrap: wrap;
    }
    .open-btn {
      font-size: 0.75rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
    }
    .open-btn:hover { border-color: #aaa; color: var(--text); }
    .coll-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-left: auto; }
    .coll-tag {
      font-size: 0.72rem;
      background: #f0f0f0;
      color: #555;
      border-radius: 3px;
      padding: 0.15rem 0.4rem;
    }

    .empty-state { color: var(--muted); font-size: 0.92rem; padding: 1rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>Zotero Semantic Search</h1>
    <span class="model-tag">{{ embed_model }}</span>
    <button class="reindex-btn" onclick="reindexAll()">Re-index All</button>
  </header>

  <main>
    <div id="progress-section">
      <div class="progress-label">
        <span id="progress-msg">Checking library…</span>
        <span id="progress-counts"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill indeterminate" id="progress-fill"></div>
      </div>
    </div>

    <div class="search-wrap">
      <div class="search-row">
        <input id="query" type="text" placeholder="Search your Zotero library…"
               onkeydown="if(event.key==='Enter') doSearch()">
        <button onclick="doSearch()">Search</button>
      </div>
      <div class="filter-row">
        <label for="coll-select">Collection:</label>
        <select id="coll-select">
          <option value="">All collections</option>
        </select>
        <span id="result-count"></span>
      </div>
    </div>

    <div id="results"></div>
  </main>

  <script>
    let _pollTimer = null;

    // ── Startup ────────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', async () => {
      loadCollections();
      const pending = await fetch('/api/index/pending').then(r => r.json()).catch(() => null);
      if (pending && pending.pending > 0) {
        showProgress(true);
        setProgress(null, pending.total, `Indexing ${pending.pending} new document${pending.pending === 1 ? '' : 's'}…`);
        const resp = await fetch('/api/index', { method: 'POST' });
        if (resp.ok) pollStatus();
        else hideProgressAfterDelay();
      }
    });

    async function loadCollections() {
      const data = await fetch('/api/collections').then(r => r.json()).catch(() => null);
      if (!data) return;
      const sel = document.getElementById('coll-select');
      sel.innerHTML = '<option value="">All collections</option>';
      data.collections.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });
    }

    // ── Indexing ───────────────────────────────────────────────────────────────

    function showProgress(on) {
      document.getElementById('progress-section').classList.toggle('visible', on);
    }

    function setProgress(current, total, msg) {
      document.getElementById('progress-msg').textContent = msg;
      const fill = document.getElementById('progress-fill');
      const counts = document.getElementById('progress-counts');
      if (current !== null && total > 0) {
        const pct = Math.round(current / total * 100);
        fill.classList.remove('indeterminate');
        fill.style.width = pct + '%';
        counts.textContent = `${current} / ${total}`;
      } else {
        fill.classList.add('indeterminate');
        fill.style.width = '';
        counts.textContent = total > 0 ? `0 / ${total}` : '';
      }
    }

    function pollStatus() {
      _pollTimer = setInterval(async () => {
        const s = await fetch('/api/index/status').then(r => r.json()).catch(() => null);
        if (!s) return;

        setProgress(s.current || null, s.total, s.message);

        if (!s.running) {
          clearInterval(_pollTimer);
          _pollTimer = null;
          if (s.last_result?.error) {
            setProgress(0, 0, 'Indexing failed: ' + s.last_result.error);
          } else if (s.last_result) {
            setProgress(s.last_result.items_processed, s.last_result.items_processed,
              `Done — ${s.last_result.vectors_stored} vectors across ${s.last_result.items_processed} documents`);
            loadCollections();
            setTimeout(() => showProgress(false), 3000);
          }
        }
      }, 800);
    }

    function hideProgressAfterDelay() {
      setTimeout(() => showProgress(false), 3000);
    }

    async function reindexAll() {
      if (!confirm('Re-index the entire library from scratch? This may take several minutes.')) return;
      if (_pollTimer) clearInterval(_pollTimer);
      showProgress(true);
      setProgress(null, 0, 'Starting full re-index…');
      const resp = await fetch('/api/index?incremental=false', { method: 'POST' });
      if (resp.ok) pollStatus();
      else {
        const err = await resp.json().catch(() => ({}));
        setProgress(0, 0, 'Error: ' + (err.error || resp.statusText));
      }
    }

    // ── Search ─────────────────────────────────────────────────────────────────

    async function doSearch() {
      const q = document.getElementById('query').value.trim();
      if (!q) return;
      const coll = document.getElementById('coll-select').value;
      const params = new URLSearchParams({ q, limit: 10 });
      if (coll) params.set('collection', coll);
      const data = await fetch('/api/search?' + params).then(r => r.json());
      renderResults(data.results);
    }

    function renderResults(results) {
      const el = document.getElementById('results');
      document.getElementById('result-count').textContent =
        results && results.length ? results.length + ' result' + (results.length === 1 ? '' : 's') : '';

      if (!results || results.length === 0) {
        el.innerHTML = '<p class="empty-state">No results found.</p>';
        return;
      }
      el.innerHTML = '';
      results.forEach(r => el.appendChild(makeCard(r)));
    }

    function makeCard(r) {
      const pct = Math.round(r.score * 100);
      const scoreClass = pct >= 80 ? 'score-high' : pct >= 60 ? 'score-mid' : 'score-low';

      const locLabel = r.location.startsWith('Page ') ? r.location : '§ ' + r.location;

      const colls = (r.collections || '').split(';').map(s => s.trim()).filter(Boolean);
      const collHtml = colls.map(c => `<span class="coll-tag">${esc(c)}</span>`).join('');

      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="card-top">
          <div class="card-citation">
            <div class="citation-byline">${esc(r.authors || 'Unknown authors')}${r.year ? ' (' + esc(r.year) + ')' : ''}</div>
            <div class="card-title">${esc(r.title)}</div>
          </div>
          <div class="card-actions">
            <span class="score-badge ${scoreClass}">${pct}%</span>
            <button class="dismiss-btn" title="Dismiss" onclick="this.closest('.result-card').remove()">×</button>
          </div>
        </div>
        <div class="fragment-row">
          <div class="loc-badge">${esc(locLabel)}</div>
          <div class="fragment">${esc(r.text)}</div>
        </div>
        <div class="card-footer">
          ${r.attach_path ? `<button class="open-btn" onclick="openFile(${JSON.stringify(r.attach_path)})">Open file</button>` : ''}
          ${collHtml ? `<div class="coll-tags">${collHtml}</div>` : ''}
        </div>`;
      return card;
    }

    async function openFile(path) {
      await fetch('/api/open?' + new URLSearchParams({ path }));
    }

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
