[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64"]

[tool.pixi.dependencies]
python = "3.12.*"
cxx-compiler = "*"        # needed to compile chroma-hnswlib
nodejs = ">=20"
fastapi = ">=0.111"
uvicorn = ">=0.30"
lxml = ">=5.0"
python-docx = ">=1.1"
python-pptx = ">=1.0"
openpyxl = ">=3.1"
pillow = ">=10.3,<11"    # pin to satisfy fastembed==0.3.6 (<11 required)

[tool.pixi.pypi-dependencies]
# Not yet on conda-forge
chromadb = "==0.5.3"
fastembed = "==0.3.6"
pymupdf = "==1.24.5"      # PDF — pip wheel bundles libmupdf (conda version requires separate mupdf package)
striprtf = ">=0.0.26"     # RTF (pure Python, tiny)

[tool.pixi.activation.env]
ANONYMIZED_TELEMETRY = "false"
HF_HUB_OFFLINE = "1"
TRANSFORMERS_OFFLINE = "1"
OLLAMA_NO_ANALYTICS = "1"
DO_NOT_TRACK = "1"

[tool.pixi.tasks]
dev = "uvicorn main:app --host 0.0.0.0 --port 8765 --reload"
app = "uvicorn main:app --host 127.0.0.1 --port 8765 --log-level info"
desktop           = "cd desktop && npm install && npm start"
nix-desktop       = "cd desktop && npm install && nix shell nixpkgs#electron_39 -c electron ."
build-desktop-mac   = "cd desktop && npm install && npm run dist:mac"
build-desktop-win   = "cd desktop && npm install && npm run dist:win"
build-desktop-linux = "cd desktop && npm install && npm run dist:linux"
delete-index = """python -c "
import os, chromadb
from chromadb.config import Settings
from pathlib import Path
p = os.environ.get('CHROMA_PATH', str(Path.home() / '.local/share/zotero-private-search/chroma'))
c = chromadb.PersistentClient(path=p, settings=Settings(anonymized_telemetry=False))
c.delete_collection('zotero_docs')
print('Index deleted from', p)
" """
